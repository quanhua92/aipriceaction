global
  log stdout format raw local0
  maxconn 1024

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  timeout connect 5s
  timeout client  30s
  timeout server  30s
  timeout queue   30s
  timeout http-request 10s
  retries 3
  retry-on all-retryable-errors

frontend http_front
  bind *:3000
  default_backend api_backend

backend api_backend
  balance leastconn
  option httpchk GET /health
  http-check expect status 200
  default-server inter 2s fall 3 rise 2
  server-template api 10 aipriceaction-api:3000 check

frontend stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
  stats admin if LOCALHOST
