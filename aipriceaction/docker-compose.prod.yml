services:
  # HAProxy — load balancer for API replicas
  haproxy:
    image: haproxy:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      aipriceaction-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8404/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
    networks:
      - app-network

  # 3 API replicas — workers disabled, HAProxy load-balanced
  aipriceaction-api:
    image: quanhua92/aipriceaction:latest
    user: "${UID:-1000}:${GID:-1000}"
    env_file: .env
    environment:
      - RUST_LOG=info
      - PORT=3000
      - DATABASE_URL=postgres://aipriceaction:${POSTGRES_PASSWORD}@postgres:5432/aipriceaction
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/0
      - VCI_WORKERS=false
      - BINANCE_WORKERS=false
      - YAHOO_WORKERS=false
      - SJC_WORKERS=false
      - REDIS_WORKERS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
    networks:
      - app-network

  # 1 worker replica — all workers enabled (env defaults)
  aipriceaction-worker:
    image: quanhua92/aipriceaction:latest
    user: "${UID:-1000}:${GID:-1000}"
    env_file: .env
    environment:
      - RUST_LOG=info
      - PORT=3000
      - DATABASE_URL=postgres://aipriceaction:${POSTGRES_PASSWORD}@postgres:5432/aipriceaction
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: aipriceaction-postgres
    user: "${UID:-999}:${GID:-999}"
    environment:
      - POSTGRES_USER=aipriceaction
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aipriceaction
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backups:/app/backups
      - ./scripts/backup-db.sh:/app/scripts/backup-db.sh:ro
      - ./scripts/restore-db.sh:/app/scripts/restore-db.sh:ro
    #ports:
    #  - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipriceaction"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: aipriceaction-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    #ports:
    #  - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
